<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profit Calculator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f7f7f7;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      color: #222;
    }

    .calculator {
      width: 760px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 16px;
      padding: 36px 44px 34px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.04);
    }

    h1 {
      margin: 0;
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .subtitle {
      margin-top: 10px;
      color: #777;
      font-size: 15px;
    }

    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 36px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      color: #555;
      font-size: 15px;
      font-weight: 600;
    }

    .input-box {
      display: flex;
      height: 54px;
      border: 1px solid #cfcfcf;
      border-radius: 7px;
      overflow: hidden;
      background: #fff;
    }

    .prefix {
      width: 66px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      border-right: 1px solid #d8d8d8;
      color: #555;
      font-size: 20px;
      font-weight: 600;
    }

    input[type="number"] {
      width: 100%;
      border: 0;
      outline: 0;
      padding: 0 16px;
      font-size: 21px;
      color: #111;
      background: transparent;
    }

    .exchange-section {
      margin-top: 28px;
    }

    .exchange-title {
      color: #555;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .exchange-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #8cc152;
    }

    .exchange-value {
      width: 50px;
      text-align: right;
      font-size: 18px;
      color: #111;
    }

    .divider {
      height: 1px;
      background: #e5e5e5;
      margin: 28px 0 24px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
    }

    .card {
      min-height: 106px;
      border-radius: 8px;
      background: #fafafa;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 16px 10px;
    }

    .card-title {
      font-size: 14px;
      color: #555;
      text-align: center;
      line-height: 1.35;
    }

    .one-line {
      white-space: nowrap;
    }

    .card-value {
      margin-top: 10px;
      font-size: 27px;
      font-weight: 700;
      color: #111;
      letter-spacing: 0.3px;
    }

    .green {
      color: #4f8f38;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      display: flex;
      margin-top: 28px;
      background: #eee;
    }

    .cost-bar {
      background: #b9daf2;
      transition: width 0.2s ease;
    }

    .profit-bar {
      background: #90c456;
      transition: width 0.2s ease;
    }

    .legend {
      display: flex;
      align-items: center;
      gap: 22px;
      margin-top: 13px;
      color: #555;
      font-size: 15px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot.cost {
      background: #b9daf2;
    }

    .dot.profit {
      background: #90c456;
    }

    @media (max-width: 820px) {
      body {
        align-items: flex-start;
        padding: 18px;
      }

      .calculator {
        width: 100%;
        padding: 28px 22px;
      }

      .inputs {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .cards {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>
<body>
  <main class="calculator">
    <h1>利润计算器 Profit Calculator</h1>
    <div class="subtitle">成本价 (CNY) → 零售价 (SGD) → 利润 & 利润率</div>

    <section class="inputs">
      <div>
        <label for="costCny">成本价 Cost price (¥ CNY)</label>
        <div class="input-box">
          <div class="prefix">¥</div>
          <input id="costCny" type="number" value="40" min="0" step="0.01" />
        </div>
      </div>

      <div>
        <label for="sellSgd">零售价 Sell price (S$ SGD)</label>
        <div class="input-box">
          <div class="prefix">S$</div>
          <input id="sellSgd" type="number" value="80" min="0" step="0.01" />
        </div>
      </div>
    </section>

    <section class="exchange-section">
      <div class="exchange-title">SGD → CNY exchange rate（S$1 = <strong id="rateInline">5.32</strong> ¥）</div>
      <div class="exchange-row">
        <input id="rate" type="range" min="1" max="10" step="0.01" value="5.32" />
        <div class="exchange-value" id="rateValue">5.32</div>
      </div>
    </section>

    <div class="divider"></div>

    <section class="cards">
      <div class="card">
        <div class="card-title">成本 Cost (SGD)</div>
        <div class="card-value" id="costSgd">S$7.52</div>
      </div>

      <div class="card">
        <div class="card-title">利润 Profit (SGD)</div>
        <div class="card-value green" id="profitSgd">S$72.48</div>
      </div>

      <div class="card">
        <div class="card-title one-line">成本利润率 Cost Margin</div>
        <div class="card-value green" id="costProfitRate">964.9%</div>
      </div>

      <div class="card">
        <div class="card-title">利润率 Margin</div>
        <div class="card-value green" id="margin">90.6%</div>
      </div>
    </section>

    <div class="bar" aria-label="Cost and profit ratio bar">
      <div class="cost-bar" id="costBar"></div>
      <div class="profit-bar" id="profitBar"></div>
    </div>

    <div class="legend">
      <span class="legend-item"><span class="dot cost"></span>Cost</span>
      <span class="legend-item"><span class="dot profit"></span>Profit</span>
    </div>
  </main>

  <script>
    const costCnyInput = document.getElementById("costCny");
    const sellSgdInput = document.getElementById("sellSgd");
    const rateInput = document.getElementById("rate");

    const rateInline = document.getElementById("rateInline");
    const rateValue = document.getElementById("rateValue");
    const costSgd = document.getElementById("costSgd");
    const profitSgd = document.getElementById("profitSgd");
    const costProfitRate = document.getElementById("costProfitRate");
    const margin = document.getElementById("margin");
    const costBar = document.getElementById("costBar");
    const profitBar = document.getElementById("profitBar");

    function money(value) {
      if (!Number.isFinite(value)) return "S$0.00";
      return `S$${value.toFixed(2)}`;
    }

    function percent(value) {
      if (!Number.isFinite(value)) return "0.0%";
      return `${value.toFixed(1)}%`;
    }

    function calculate() {
      const costCny = Number(costCnyInput.value) || 0;
      const sellSgd = Number(sellSgdInput.value) || 0;
      const rate = Number(rateInput.value) || 1;

      const cost = costCny / rate;
      const profit = sellSgd - cost;

      const marginRate = sellSgd > 0 ? (profit / sellSgd) * 100 : 0;
      const costProfitRateValue = cost > 0 ? (profit / cost) * 100 : 0;

      const costRatio = sellSgd > 0 ? Math.max(0, Math.min(100, (cost / sellSgd) * 100)) : 0;
      const profitRatio = sellSgd > 0 ? Math.max(0, Math.min(100, (profit / sellSgd) * 100)) : 0;

      rateInline.textContent = rate.toFixed(2);
      rateValue.textContent = rate.toFixed(2);
      costSgd.textContent = money(cost);
      profitSgd.textContent = money(profit);
      costProfitRate.textContent = percent(costProfitRateValue);
      margin.textContent = percent(marginRate);

      costBar.style.width = `${costRatio}%`;
      profitBar.style.width = `${profitRatio}%`;
    }

    [costCnyInput, sellSgdInput, rateInput].forEach((input) => {
      input.addEventListener("input", calculate);
    });

    calculate();
  </script>
</body>
</html>
