<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>利润计算器 Profit Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #f5f5f0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 40px 16px;
    }
    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 0.5px solid #e0e0e0;
      padding: 32px;
      width: 100%;
      max-width: 560px;
    }
    h1 {
      font-size: 20px;
      font-weight: 500;
      color: #111;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }
    .input-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }
    label {
      font-size: 13px;
      color: #666;
      display: block;
      margin-bottom: 6px;
    }
    .input-wrap {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.2s;
    }
    .input-wrap:focus-within {
      border-color: #aaa;
    }
    .prefix {
      padding: 0 12px;
      font-size: 15px;
      color: #888;
      background: #f5f5f5;
      height: 40px;
      display: flex;
      align-items: center;
      border-right: 1px solid #ddd;
      flex-shrink: 0;
    }
    input[type="number"] {
      flex: 1;
      border: none;
      outline: none;
      padding: 0 12px;
      font-size: 15px;
      height: 40px;
      background: #fff;
      color: #111;
      width: 100%;
    }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .rate-section { margin-bottom: 24px; }
    .rate-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }
    .rate-label span { color: #111; font-weight: 500; }
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #fff;
      border: 1.5px solid #aaa;
      cursor: pointer;
    }
    .rate-val {
      font-size: 14px;
      font-weight: 500;
      color: #111;
      min-width: 36px;
      text-align: right;
    }
    .divider {
      border: none;
      border-top: 0.5px solid #e8e8e8;
      margin-bottom: 20px;
    }
    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .result-card {
      background: #f7f7f5;
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
    }
    .result-label {
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
    }
    .result-value {
      font-size: 22px;
      font-weight: 500;
      color: #111;
    }
    .result-value.green { color: #4a8a1a; }
    .result-value.red { color: #c0392b; }
    .bar-wrap { display: none; }
    .bar-track {
      display: flex;
      gap: 4px;
      height: 10px;
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .bar-cost { background: #B5D4F4; transition: width 0.3s; }
    .bar-profit { transition: width 0.3s; }
    .legend {
      display: flex;
      gap: 16px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #666;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    @media (max-width: 480px) {
      .input-grid { grid-template-columns: 1fr; }
      .results { grid-template-columns: 1fr; }
      .card { padding: 20px; }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>利润计算器 Profit Calculator</h1>
    <p class="subtitle">成本价 (CNY) → 零售价 (SGD) → 利润 &amp; 利润率</p>

    <div class="input-grid">
      <div>
        <label>成本价 Cost price (¥ CNY)</label>
        <div class="input-wrap">
          <span class="prefix">¥</span>
          <input type="number" id="cny" placeholder="0.00" min="0" step="0.01" oninput="calc()">
        </div>
      </div>
      <div>
        <label>零售价 Sell price (S$ SGD)</label>
        <div class="input-wrap">
          <span class="prefix">S$</span>
          <input type="number" id="sgd" placeholder="0.00" min="0" step="0.01" oninput="calc()">
        </div>
      </div>
    </div>

    <div class="rate-section">
      <div class="rate-label">SGD → CNY exchange rate &nbsp; (S$1 = <span id="rate-display">5.32</span> ¥)</div>
      <div class="slider-row">
        <input type="range" min="4.50" max="6.00" step="0.01" value="5.32" id="rate"
          oninput="document.getElementById('rate-out').textContent=parseFloat(this.value).toFixed(2); document.getElementById('rate-display').textContent=parseFloat(this.value).toFixed(2); calc()">
        <span class="rate-val" id="rate-out">5.32</span>
      </div>
    </div>

    <hr class="divider">

    <div class="results">
      <div class="result-card">
        <div class="result-label">成本 Cost (SGD)</div>
        <div class="result-value" id="cost-sgd">—</div>
      </div>
      <div class="result-card">
        <div class="result-label">利润 Profit (SGD)</div>
        <div class="result-value" id="profit">—</div>
      </div>
      <div class="result-card">
        <div class="result-label">利润率 Margin</div>
        <div class="result-value" id="margin">—</div>
      </div>
    </div>

    <div class="bar-wrap" id="bar-wrap">
      <div class="bar-track">
        <div class="bar-cost" id="bar-cost"></div>
        <div class="bar-profit" id="bar-profit"></div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="dot" style="background:#B5D4F4"></div>Cost</div>
        <div class="legend-item" id="legend-profit"></div>
      </div>
    </div>
  </div>

  <script>
    function calc() {
      const cny = parseFloat(document.getElementById('cny').value);
      const sgd = parseFloat(document.getElementById('sgd').value);
      const rate = parseFloat(document.getElementById('rate').value);
      if (isNaN(cny) || isNaN(sgd) || cny <= 0 || sgd <= 0) {
        document.getElementById('cost-sgd').textContent = '—';
        document.getElementById('profit').textContent = '—';
        document.getElementById('margin').textContent = '—';
        document.getElementById('bar-wrap').style.display = 'none';
        return;
      }
      const costSgd = cny / rate;
      const profit = sgd - costSgd;
      const marginPct = (profit / sgd) * 100;
      document.getElementById('cost-sgd').textContent = 'S$' + costSgd.toFixed(2);
      const profitEl = document.getElementById('profit');
      profitEl.textContent = (profit >= 0 ? 'S$' : '-S$') + Math.abs(profit).toFixed(2);
      profitEl.className = 'result-value ' + (profit >= 0 ? 'green' : 'red');
      const marginEl = document.getElementById('margin');
      marginEl.textContent = marginPct.toFixed(1) + '%';
      marginEl.className = 'result-value ' + (profit >= 0 ? 'green' : 'red');
      document.getElementById('bar-wrap').style.display = 'block';
      const costPct = Math.min(100, Math.max(0, (costSgd / sgd) * 100));
      document.getElementById('bar-cost').style.width = costPct.toFixed(1) + '%';
      const profitBar = document.getElementById('bar-profit');
      profitBar.style.width = (100 - costPct).toFixed(1) + '%';
      const barColor = profit >= 0 ? '#97C459' : '#F09595';
      profitBar.style.background = barColor;
      document.getElementById('legend-profit').innerHTML =
        '<div class="dot" style="background:' + barColor + '"></div>' +
        (profit >= 0 ? 'Profit' : 'Loss');
    }
  </script>
</body>
</html>
